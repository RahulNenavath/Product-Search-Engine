steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      - "build"
      - "--platform=linux/amd64"
      - "--file=embedding_service/Dockerfile"
      - "--tag=us-east4-docker.pkg.dev/$PROJECT_ID/product-search/embedding-service:${_COMMIT_SHA}"
      - "--tag=us-east4-docker.pkg.dev/$PROJECT_ID/product-search/embedding-service:latest"
      - "--cache-from=us-east4-docker.pkg.dev/$PROJECT_ID/product-search/embedding-service:latest"
      - "."

images:
  - "us-east4-docker.pkg.dev/$PROJECT_ID/product-search/embedding-service:${_COMMIT_SHA}"
  - "us-east4-docker.pkg.dev/$PROJECT_ID/product-search/embedding-service:latest"

options:
  machineType: "E2_HIGHCPU_8"
  diskSizeGb: 50
  logging: CLOUD_LOGGING_ONLY