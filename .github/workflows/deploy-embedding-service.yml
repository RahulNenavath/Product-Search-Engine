name: Deploy Embedding Service

on:
  push:
    branches:
      - main
    paths:
      - "embedding_service/**"

env:
  PROJECT: ${{ vars.GCP_PROJECT }}
  REGION:  us-east4
  SERVICE: product-search-embedding-service
  IMAGE:   us-east4-docker.pkg.dev/${{ vars.GCP_PROJECT }}/product-search/embedding-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: embedding_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --gpu=1
            --gpu-type=nvidia-l4
            --cpu=8
            --memory=32Gi
            --max-instances=1
            --concurrency=4
            --timeout=120s
            --execution-environment=gen2
            --allow-unauthenticated
            --port=8001
            --startup-cpu-boost
            --startup-probe-initial-delay-seconds=30
            --add-volume=name=models,type=cloud-storage,bucket=${{ vars.GCS_MODEL_BUCKET }}
            --add-volume-mount=volume=models,mount-path=/models
          env_vars: |
            EMBEDDING_MODEL_PATH=/models/finetuned_encoder
            RERANKER_MODEL_NAME=/models/bge-reranker-v2-m3

      - name: Print deployed service URL
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT }}" \
            --format="value(status.url)")
          echo "Embedding service URL: ${URL}"
          echo "Add this to your local .env:"
          echo "  EMBEDDING_SERVICE_URL=${URL}"