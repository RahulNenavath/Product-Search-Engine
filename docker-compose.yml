services:
  opensearch:
    image: opensearchproject/opensearch:3.4.0
    container_name: opensearch
    env_file:
      - dev.env
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── Local orchestrator API (no models, no GPU needed) ──────────────────────
  # Handles OpenSearch queries and delegates embedding/reranking to the Cloud
  # Run embedding service via EMBEDDING_SERVICE_URL.
  # Set EMBEDDING_SERVICE_URL to the Cloud Run URL after deploying:
  #   EMBEDDING_SERVICE_URL=https://... docker compose up
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: product-search-api
    env_file:
      - dev.env
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      # Point at the Cloud Run embedding service after deploying it.
      # For local testing you can run embedding_service/ directly on port 8001.
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL:-http://localhost:8001}
      - EMBEDDING_SERVICE_TIMEOUT=60
    depends_on:
      opensearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: product-search-ui
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
    depends_on:
      - api
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  opensearch-data: {}
